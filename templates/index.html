<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/nav.css">
    <link rel="stylesheet" href="../../styles/fotter.css">
    <link rel="stylesheet" href="../../styles/model_view.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
</head>
<body>
    <div class="all">
        <!-- НАВ-->
        <div class="for_nav">
            <nav id="nav_user">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"></div> <!--Идет значение БД-->
                    <div class="user-name" id="userName">Загрузка...</div> <!--Идет значение БД-->
                </div>
                <div class="users_stars_div">
                    <div style="font-size:24px; font-weight: bold;" class="user-stars" id="userStars">0</div> <!--Идет значение БД-->
                    <div class="starsss_img"><img src="../imgs/for_nav/star.png" alt="Звезда"></div>
                </div>
            </nav>
        </div>

        <!-- МОДАЛЬНЫЕ ОКНА -->
        <div class="models-container">
            
            <div id="model_view_1" class="model-view active-view" data-view="1">
                <div class="model-content">
                <div class="stats-row">
                    <div class="stat-block">
                        <div class="stat-label">За 1 клик</div>
                        <div class="stat-value">
                            <img src="../imgs/users_api/monetka.svg" alt="coin" class="stat-icon">
                            <span id="user_upgrade">1</span> <!--Идет значение БД-->
                        </div>
                    </div>
            
                    <div class="stat-block">
                        <div class="stat-label">Необходимо</div>
                        <div class="stat-value">
                            <span>150</span>
                        </div>
                    </div>
            
                    <div class="stat-block">
                        <div class="stat-label">Монет в сек.</div>
                        <div class="stat-value">
                            <img src="..//imgs/users_api/monetka.svg" alt="money" class="stat-icon">
                            <span id="user_upgrae_sek">0</span> <!--Идет значение БД-->
                        </div>
                    </div>
                </div>
                <div class="main-image-container">
                    <img src="../imgs/users_api/monetka.svg" alt="main coin" class="main-image">
                    <div id="user_content_coin_lol" class="main-counter">0</div> <!--Идет значение БД-->
                </div>  

            <div class="progress-container">
                <div class="progress-info">
                    <span id="progress-count"><span id="level">1</span>/10</span> <!--идет значени в БД-->
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                </div>
            </div>

            <div class="bottom-section">
                <div id="tap_tap" class="tapalka">
                    <div id="sticker" style="width:200px; height:200px;"></div>
                </div>
            </div>
            </div>
        </div>













            <div id="model_view_2" class="model-view" data-view="2">
                <div class="model-content">
                    <h2>Upgrade</h2>
                    <p>Контент для Upgrade</p>
                </div>
            </div>
            <div id="model_view_3" class="model-view" data-view="3">
                <div class="model-content">
                    <h2>Donate</h2>
                    <p>Контент для Donate</p>
                </div>
            </div>
            <div id="model_view_4" class="model-view" data-view="4">
                <div class="model-content">
                    <h2>Leaderboard</h2>
                    <p>Контент для Leaderboard</p>
                </div>
            </div>
            <div id="model_view_5" class="model-view" data-view="5">
                <div class="model-content">
                    <h2>PromoCodes</h2>
                    <p>Контент для PromoCodes</p>
                </div>
            </div>
        </div>

        <!-- ФУТЕР-->
        <div class="for_footer">
            <footer id="footer">
                <a href="#glav" class="active" data-view="1">
                    <div id="first" class="firstt">
                        <img src="../imgs/for_fyter/dollar.png" alt="coin">
                        <h4>Exchange</h4>
                    </div>
                </a>
                <a href="#buy" data-view="2">
                    <div id="two" class="twoo">
                        <img src="../imgs/for_fyter/pickaxe.png" alt="pickaxe">
                        <h4>Upgrade</h4>
                    </div>
                </a>
                <a href="#don_buy" data-view="3">
                    <div id="three" class="threee">
                        <img src="../imgs/for_fyter/money.png" alt="money">
                        <h4>Donate</h4>
                    </div>
                </a>
                <a href="#tops" data-view="4">
                    <div id="four" class="fourr">
                        <img src="../imgs/for_fyter/top_lider.png" alt="lider">
                        <h4>Leaderboard</h4>
                    </div>
                </a>
                <a href="#proms" data-view="5">
                    <div id="five" class="fivee">
                        <img src="../imgs/for_fyter/Gift.png" alt="Gift">
                        <h4>PromoCodes</h4>
                    </div>
                </a>
            </footer>
        </div>
    </div>
</body>
<script src="../../js/main.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="../../js/crystals.js"></script>
<script src="../../js/click.js"></script>
</html>
